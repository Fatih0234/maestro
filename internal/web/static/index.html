<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contrabass Dashboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0d1117;
    color: #c9d1d9;
    line-height: 1.5;
  }
  .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
  h1 { font-size: 1.5rem; margin-bottom: 8px; color: #f0f6fc; }
  .subtitle { color: #8b949e; font-size: 0.875rem; margin-bottom: 20px; }
  .stats {
    display: flex; gap: 16px; margin-bottom: 20px; flex-wrap: wrap;
  }
  .stat-box {
    background: #161b22; border: 1px solid #30363d; border-radius: 8px;
    padding: 12px 20px; min-width: 140px;
  }
  .stat-box .label { font-size: 0.75rem; color: #8b949e; text-transform: uppercase; }
  .stat-box .value { font-size: 1.5rem; font-weight: 600; color: #f0f6fc; }
  .board {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 16px; margin-bottom: 20px;
  }
  .column {
    background: #161b22; border: 1px solid #30363d; border-radius: 8px;
    padding: 16px; min-height: 200px;
  }
  .column h2 {
    font-size: 0.875rem; text-transform: uppercase; letter-spacing: 0.05em;
    margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid #30363d;
  }
  .column.running h2 { color: #3fb950; }
  .column.backoff h2 { color: #d29922; }
  .column.review h2 { color: #58a6ff; }
  .card {
    background: #0d1117; border: 1px solid #30363d; border-radius: 6px;
    padding: 12px; margin-bottom: 10px; transition: border-color 0.2s;
  }
  .card:hover { border-color: #484f58; }
  .card-id {
    font-size: 0.75rem; font-weight: 600; color: #58a6ff; margin-bottom: 4px;
  }
  .card-title { font-size: 0.875rem; color: #f0f6fc; margin-bottom: 6px; }
  .card-meta {
    font-size: 0.75rem; color: #8b949e; display: flex; gap: 12px; flex-wrap: wrap;
  }
  .card-meta span { display: flex; align-items: center; gap: 4px; }
  .badge {
    display: inline-block; padding: 2px 8px; border-radius: 12px;
    font-size: 0.6875rem; font-weight: 500; text-transform: uppercase;
  }
  .badge-plan { background: #388bfd26; color: #58a6ff; }
  .badge-execute { background: #3fb95026; color: #3fb950; }
  .badge-verify { background: #a371f726; color: #a371f7; }
  .badge-backoff { background: #d2992226; color: #d29922; }
  .empty {
    text-align: center; color: #484f58; font-size: 0.875rem; padding: 32px 0;
    font-style: italic;
  }
  .event-log {
    background: #161b22; border: 1px solid #30363d; border-radius: 8px;
    padding: 16px; max-height: 300px; overflow-y: auto;
  }
  .event-log h2 {
    font-size: 0.875rem; text-transform: uppercase; letter-spacing: 0.05em;
    margin-bottom: 12px; color: #8b949e;
  }
  .event {
    font-family: "SFMono-Regular", Consolas, monospace; font-size: 0.8125rem;
    padding: 4px 0; border-bottom: 1px solid #21262d; display: flex; gap: 12px;
  }
  .event:last-child { border-bottom: none; }
  .event-time { color: #484f58; min-width: 60px; }
  .event-type { color: #58a6ff; min-width: 140px; }
  .event-issue { color: #d29922; min-width: 60px; }
  .event-payload { color: #8b949e; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .status-bar {
    display: flex; align-items: center; gap: 8px; margin-bottom: 16px;
    font-size: 0.875rem;
  }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%; display: inline-block;
  }
  .status-dot.connected { background: #3fb950; }
  .status-dot.disconnected { background: #f85149; }
  .status-dot.connecting { background: #d29922; }
  button {
    background: #238636; color: #fff; border: none; border-radius: 6px;
    padding: 6px 16px; font-size: 0.875rem; cursor: pointer; margin-left: auto;
  }
  button:hover { background: #2ea043; }
  .error-banner {
    background: #f8514926; border: 1px solid #f85149; color: #f85149;
    padding: 12px 16px; border-radius: 8px; margin-bottom: 16px; font-size: 0.875rem;
  }
</style>
</head>
<body>
<div class="container">
  <h1>Contrabass Dashboard</h1>
  <p class="subtitle">Live orchestrator state</p>

  <div class="status-bar">
    <span class="status-dot connecting" id="statusDot"></span>
    <span id="statusText">Connecting...</span>
    <button onclick="refresh()">Refresh</button>
  </div>

  <div id="errorBanner" class="error-banner" style="display:none"></div>

  <div class="stats" id="stats">
    <div class="stat-box">
      <div class="label">Running</div>
      <div class="value" id="statRunning">-</div>
    </div>
    <div class="stat-box">
      <div class="label">Backoff</div>
      <div class="value" id="statBackoff">-</div>
    </div>
    <div class="stat-box">
      <div class="label">Review</div>
      <div class="value" id="statReview">-</div>
    </div>
    <div class="stat-box">
      <div class="label">Tokens In</div>
      <div class="value" id="statTokensIn">-</div>
    </div>
    <div class="stat-box">
      <div class="label">Tokens Out</div>
      <div class="value" id="statTokensOut">-</div>
    </div>
  </div>

  <div class="board">
    <div class="column running">
      <h2>Running</h2>
      <div id="colRunning"><div class="empty">No active runs</div></div>
    </div>
    <div class="column backoff">
      <h2>Backoff</h2>
      <div id="colBackoff"><div class="empty">No queued retries</div></div>
    </div>
    <div class="column review">
      <h2>Review</h2>
      <div id="colReview"><div class="empty">No issues awaiting review</div></div>
    </div>
  </div>

  <div class="event-log">
    <h2>Event Log</h2>
    <div id="eventLog"></div>
  </div>
</div>

<script>
const API_BASE = window.location.origin;
let eventSource = null;
let reconnectTimer = null;

function escapeHtml(str) {
  if (str == null) return '';
  const span = document.createElement('span');
  span.textContent = String(str);
  return span.innerHTML;
}

function setStatus(state, text) {
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusText');
  dot.className = 'status-dot ' + state;
  txt.textContent = text;
}

function showError(msg) {
  const el = document.getElementById('errorBanner');
  if (msg) {
    el.textContent = msg;
    el.style.display = 'block';
  } else {
    el.style.display = 'none';
  }
}

function formatNumber(n) {
  if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n / 1e3).toFixed(1) + 'k';
  return n.toString();
}

function formatTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

function badgeClass(stage) {
  const s = (stage || '').toLowerCase();
  if (s.includes('plan')) return 'badge-plan';
  if (s.includes('execute')) return 'badge-execute';
  if (s.includes('verify')) return 'badge-verify';
  return 'badge-backoff';
}

function renderCard(item, type) {
  if (type === 'running') {
    return `
      <div class="card">
        <div class="card-id">${escapeHtml(item.issue_id)}</div>
        <div class="card-title">${escapeHtml(item.title || 'Untitled')}</div>
        <div class="card-meta">
          <span class="badge ${badgeClass(item.stage)}">${escapeHtml(item.stage)}</span>
          <span>Attempt ${escapeHtml(item.attempt)}</span>
          ${item.pid ? `<span>PID ${escapeHtml(item.pid)}</span>` : ''}
          ${item.tokens_in > 0 || item.tokens_out > 0 ? `<span>${formatNumber(item.tokens_in)} / ${formatNumber(item.tokens_out)} tok</span>` : ''}
          ${item.error ? `<span style="color:#f85149">${escapeHtml(item.error)}</span>` : ''}
        </div>
      </div>
    `;
  }
  if (type === 'backoff') {
    return `
      <div class="card">
        <div class="card-id">${escapeHtml(item.issue_id)}</div>
        <div class="card-meta">
          <span class="badge ${badgeClass(item.stage)}">${escapeHtml(item.stage)}</span>
          <span>Attempt ${escapeHtml(item.attempt)}</span>
          <span>Retry ${formatTime(item.retry_at)}</span>
        </div>
        ${item.error ? `<div style="margin-top:6px;font-size:0.75rem;color:#f85149">${escapeHtml(item.error)}</div>` : ''}
      </div>
    `;
  }
  if (type === 'review') {
    return `
      <div class="card">
        <div class="card-id">${escapeHtml(item.issue_id)}</div>
        <div class="card-title">${escapeHtml(item.title || 'Untitled')}</div>
        <div class="card-meta">
          <span>Ready ${formatTime(item.ready_at)}</span>
          ${item.branch ? `<span>${escapeHtml(item.branch)}</span>` : ''}
        </div>
      </div>
    `;
  }
  return '';
}

function renderSnapshot(data) {
  const stats = data.stats || {};
  document.getElementById('statRunning').textContent = data.running?.length ?? 0;
  document.getElementById('statBackoff').textContent = data.backoff?.length ?? 0;
  document.getElementById('statReview').textContent = data.review?.length ?? 0;
  document.getElementById('statTokensIn').textContent = formatNumber(stats.total_tokens_in || 0);
  document.getElementById('statTokensOut').textContent = formatNumber(stats.total_tokens_out || 0);

  document.getElementById('colRunning').innerHTML =
    data.running?.length ? data.running.map(i => renderCard(i, 'running')).join('') : '<div class="empty">No active runs</div>';

  document.getElementById('colBackoff').innerHTML =
    data.backoff?.length ? data.backoff.map(i => renderCard(i, 'backoff')).join('') : '<div class="empty">No queued retries</div>';

  document.getElementById('colReview').innerHTML =
    data.review?.length ? data.review.map(i => renderCard(i, 'review')).join('') : '<div class="empty">No issues awaiting review</div>';
}

function logEvent(event) {
  const log = document.getElementById('eventLog');
  const time = formatTime(event.timestamp) || formatTime(new Date().toISOString());
  const payload = event.payload ? JSON.stringify(event.payload).substring(0, 80) : '';

  const row = document.createElement('div');
  row.className = 'event';
  row.innerHTML = `
    <span class="event-time">${escapeHtml(time)}</span>
    <span class="event-type">${escapeHtml(event.type)}</span>
    ${event.issue_id ? `<span class="event-issue">${escapeHtml(event.issue_id)}</span>` : '<span class="event-issue"></span>'}
    <span class="event-payload">${escapeHtml(payload)}</span>
  `;
  row.querySelector('.event-payload').setAttribute('title', payload);
  log.insertBefore(row, log.firstChild);

  // Keep only last 50 events
  while (log.children.length > 50) {
    log.removeChild(log.lastChild);
  }
}

async function refresh() {
  try {
    const res = await fetch(API_BASE + '/api/v1/state');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    renderSnapshot(data);
    showError(null);
  } catch (err) {
    showError('Failed to fetch state: ' + err.message);
  }
}

function connectSSE() {
  if (eventSource) {
    eventSource.close();
  }

  setStatus('connecting', 'Connecting...');

  eventSource = new EventSource(API_BASE + '/api/v1/events');

  eventSource.addEventListener('snapshot', (e) => {
    try {
      const data = JSON.parse(e.data);
      renderSnapshot(data);
      showError(null);
    } catch (err) {
      console.error('Failed to parse snapshot:', err);
    }
  });

  eventSource.addEventListener('orchestrator', (e) => {
    try {
      const event = JSON.parse(e.data);
      logEvent(event);
    } catch (err) {
      console.error('Failed to parse event:', err);
    }
  });

  eventSource.onopen = () => {
    setStatus('connected', 'Live');
    showError(null);
  };

  eventSource.onerror = () => {
    setStatus('disconnected', 'Disconnected');
    if (eventSource.readyState === EventSource.CLOSED) {
      showError('Connection lost. Retrying in 3s...');
      reconnectTimer = setTimeout(connectSSE, 3000);
    }
  };
}

// Init
refresh();
connectSSE();
</script>
</body>
</html>
